<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Invitation Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="generator-container">
        <h1>✨ Custom Invitation Maker</h1>
        <p class="subtitle">Fill out the details below to generate a unique shareable link for your clients.</p>

        <!-- Step 1: Category Grid Selection -->
        <label class="section-label">1. Select Occasion Category</label>
        <div class="category-grid">
            <div class="category-card active" data-category="Wedding">💍 Wedding</div>
            <div class="category-card" data-category="Birthday">🎂 Birthday</div>
            <div class="category-card" data-category="Anniversary">🥂 Anniversary</div>
            <div class="category-card" data-category="Baby Shower">🍼 Baby Shower</div>
            <div class="category-card" data-category="House Warming">🏡 House Warming</div>
            <div class="category-card" data-category="Gala Party">🎉 Gala Party</div>
            <div class="category-card" data-category="Inauguration">🏢 Inauguration</div>
            <div class="category-card" data-category="Music Concert">🎵 Music Event</div>
            <div class="category-card" data-category="Farewell">🎓 Graduation/Farewell</div>
            <div class="category-card" data-category="Festival">🌟 Festival Celebration</div>
        </div>

        <!-- Step 2: Information Inputs -->
        <label class="section-label">2. Enter Event Details</label>
        <form id="invite-form">
            <div class="form-group">
                <label>Event Title / Host Names</label>
                <input type="text" id="event-title" placeholder="e.g., Shadiya & Badusha" required>
            </div>

            <div class="form-group">
                <label>Date & Time</label>
                <input type="text" id="event-date" placeholder="e.g., Saturday, Oct 10, 2026 at 6:00 PM" required>
            </div>

            <div class="form-group">
                <label>Venue Address</label>
                <input type="text" id="event-venue" placeholder="e.g., The Grand Quartz Ballroom, NY" required>
            </div>

            <div class="form-group">
                <label>Background Music URL (.mp3 direct link or hosted file)</label>
                <input type="url" id="event-music" value="song.mp3" required>
            </div>

            <div class="form-group">
                <label>Personal Message / Description</label>
                <textarea id="event-message" rows="3" placeholder="Join us to celebrate this beautiful milestone..."></textarea>
            </div>

            <button type="submit" class="primary-btn">Generate Invitation Link 🚀</button>
        </form>

        <!-- Step 3: Shareable Result Link Box -->
        <div id="result-box" class="hidden">
            <label class="section-label">🎉 Your Client's Invitation Link is Ready!</label>
            <div class="copy-container">
                <input type="text" id="generated-url" readonly>
                <button id="copy-btn">Copy Link</button>
            </div>
            <a id="preview-btn" href="#" target="_blank" class="preview-link">Open Live Preview ↗</a>
        </div>
    </div>

    <script>
        // Managing category active selection state
        let selectedCategory = "Wedding";
        const cards = document.querySelectorAll('.category-card');
        cards.forEach(card => {
            card.addEventListener('click', () => {
                cards.forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                selectedCategory = card.getAttribute('data-category');
            });
        });

        // Form Submission Logic
        document.getElementById('invite-form').addEventListener('submit', (e) => {
            e.preventDefault();
            
            // Collect all custom inputs
            const title = encodeURIComponent(document.getElementById('event-title').value);
            const date = encodeURIComponent(document.getElementById('event-date').value);
            const venue = encodeURIComponent(document.getElementById('event-venue').value);
            const music = encodeURIComponent(document.getElementById('event-music').value);
            const message = encodeURIComponent(document.getElementById('event-message').value);
            const category = encodeURIComponent(selectedCategory);

            // Construct link pointing to invitation.html loaded with query parameters
            const basePath = window.location.href.replace('index.html', '') + 'invitation.html';
            const finalLink = `${basePath}?title=${title}&date=${date}&venue=${venue}&music=${music}&msg=${message}&cat=${category}`;

            // Show generated link box
            document.getElementById('generated-url').value = finalLink;
            document.getElementById('preview-btn').href = finalLink;
            document.getElementById('result-box').classList.remove('hidden');
            document.getElementById('result-box').scrollIntoView({ behavior: 'smooth' });
        });

        // Copy Button Utility
        document.getElementById('copy-btn').addEventListener('click', () => {
            const urlInput = document.getElementById('generated-url');
            urlInput.select();
            document.execCommand('copy');
            alert('Link copied to clipboard! You can now send this link directly to your client.');
        });
    </script>
</body>
</html>
