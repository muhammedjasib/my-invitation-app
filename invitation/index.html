<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Wedding Invitation">
    <meta name="theme-color" content="#D4A574">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/assets/images/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="manifest" href="../public/manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css" />
    <link rel="stylesheet" href="../assets/css/invitation.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), url('/assets/images/wedding-bg.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.5) 100%);
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            animation: slideDown 1s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .hero p {
            font-size: 20px;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .open-btn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #D4A574 0%, #8B7355 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 165, 116, 0.4);
        }

        .open-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(212, 165, 116, 0.6);
        }

        .scroll-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(10px); }
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Sections */
        section {
            padding: 80px 20px;
        }

        section h2 {
            font-size: 36px;
            text-align: center;
            margin-bottom: 50px;
            color: #333;
            position: relative;
        }

        section h2::after {
            content: '';
            display: block;
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #D4A574, transparent);
            margin: 15px auto 0;
        }

        /* Couple Section */
        .couple-section {
            background: #f9f9f9;
        }

        .couple-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            align-items: center;
            max-width: 1000px;
            margin: 0 auto;
        }

        .couple-card {
            text-align: center;
        }

        .couple-photo {
            width: 300px;
            height: 300px;
            border-radius: 10px;
            object-fit: cover;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .couple-photo:hover {
            transform: scale(1.05);
        }

        .couple-name {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .couple-subtitle {
            font-size: 14px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .couple-bio {
            font-size: 15px;
            color: #666;
            line-height: 1.8;
        }

        /* Countdown */
        .countdown {
            background: linear-gradient(135deg, #D4A574 0%, #8B7355 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }

        .countdown h2 {
            color: white;
            margin-bottom: 40px;
        }

        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .countdown-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .countdown-number {
            font-size: 32px;
            font-weight: 700;
            display: block;
        }

        .countdown-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        /* Gallery */
        .gallery-section {
            background: white;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            cursor: pointer;
            aspect-ratio: 1;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .gallery-overlay i {
            font-size: 40px;
            color: white;
        }

        /* RSVP Section */
        .rsvp-section {
            background: #f9f9f9;
        }

        .rsvp-form {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #D4A574;
            box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #D4A574 0%, #8B7355 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 165, 116, 0.3);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #D4A574;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Error */
        .error-container {
            text-align: center;
            padding: 60px 20px;
        }

        .error-container h2 {
            color: #c33;
            margin-bottom: 20px;
        }

        .error-container p {
            color: #666;
            margin-bottom: 20px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 32px;
            }

            .hero p {
                font-size: 16px;
            }

            .couple-grid {
                grid-template-columns: 1fr;
                gap: 30px;
            }

            .couple-photo {
                width: 250px;
                height: 250px;
            }

            section {
                padding: 60px 20px;
            }

            section h2 {
                font-size: 28px;
            }

            .countdown-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <section class="hero" id="hero">
        <div class="hero-content">
            <h1 id="coupleName">Bride & Groom</h1>
            <p id="weddingDate">Join us for our wedding</p>
            <button class="open-btn" onclick="scrollToSection('details')">See Full Invitation</button>
        </div>
        <div class="scroll-indicator">
            <i class="fas fa-chevron-down"></i>
        </div>
    </section>

    <!-- Wedding Details -->
    <section id="details" class="container" style="padding: 60px 20px; background: white;">
        <div class="couple-grid" data-aos="fade-up">
            <div class="couple-card">
                <img id="photo1" src="" alt="" class="couple-photo">
                <h3 class="couple-name" id="name1"></h3>
                <p class="couple-subtitle" id="subtitle1"></p>
                <p class="couple-bio" id="bio1"></p>
            </div>
            <div class="couple-card">
                <img id="photo2" src="" alt="" class="couple-photo">
                <h3 class="couple-name" id="name2"></h3>
                <p class="couple-subtitle" id="subtitle2"></p>
                <p class="couple-bio" id="bio2"></p>
            </div>
        </div>
    </section>

    <!-- Countdown -->
    <section class="countdown">
        <div class="container">
            <h2>Time Until Our Special Day</h2>
            <div class="countdown-grid" id="countdown">
                <div class="countdown-item">
                    <span class="countdown-number" id="days">0</span>
                    <div class="countdown-label">Days</div>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="hours">0</span>
                    <div class="countdown-label">Hours</div>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="minutes">0</span>
                    <div class="countdown-label">Minutes</div>
                </div>
                <div class="countdown-item">
                    <span class="countdown-number" id="seconds">0</span>
                    <div class="countdown-label">Seconds</div>
                </div>
            </div>
        </div>
    </section>

    <!-- Gallery -->
    <section class="gallery-section">
        <div class="container">
            <h2 data-aos="fade-up">Gallery</h2>
            <div class="gallery-grid" id="gallery"></div>
        </div>
    </section>

    <!-- Venue Section -->
    <section class="container" style="padding: 60px 20px; background: #f9f9f9;" data-aos="fade-up">
        <h2>Our Venue</h2>
        <div style="max-width: 800px; margin: 0 auto;">
            <div id="map" style="width: 100%; height: 400px; border-radius: 10px; margin-bottom: 20px;"></div>
            <p style="text-align: center; color: #666;" id="venueInfo"></p>
        </div>
    </section>

    <!-- RSVP Section -->
    <section class="rsvp-section">
        <div class="container">
            <h2 data-aos="fade-up">RSVP</h2>
            <form class="rsvp-form" id="rsvpForm" onsubmit="handleRSVP(event)">
                <div class="form-group">
                    <label>Your Name *</label>
                    <input type="text" name="name" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone">
                </div>
                <div class="form-group">
                    <label>Number of Guests *</label>
                    <select name="guestCount" required>
                        <option value="">Select...</option>
                        <option value="1">1 Guest</option>
                        <option value="2">2 Guests</option>
                        <option value="3">3 Guests</option>
                        <option value="4">4 Guests</option>
                        <option value="5">5+ Guests</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Will you attend? *</label>
                    <select name="attending" required>
                        <option value="">Select...</option>
                        <option value="true">Yes, I'll be there!</option>
                        <option value="false">Sorry, can't make it</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Meal Preference</label>
                    <select name="mealPreference">
                        <option value="">Select...</option>
                        <option value="vegetarian">Vegetarian</option>
                        <option value="vegan">Vegan</option>
                        <option value="nonveg">Non-Vegetarian</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Message for the Couple</label>
                    <textarea name="message" placeholder="Share your wishes..."></textarea>
                </div>
                <button type="submit" class="submit-btn">Submit RSVP</button>
            </form>
        </div>
    </section>

    <!-- Footer -->
    <footer style="background: #333; color: white; text-align: center; padding: 30px 20px;">
        <p>&copy; 2024 Wedding Invitation. Made with ❤️</p>
    </footer>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="../config/firebase-config.js"></script>
    <script src="../assets/firebase/config.js"></script>
    <script src="../assets/firebase/firestore.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/analytics.js"></script>
    <script src="invitation.js"></script>
</body>
</html>
